<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NCAA Tournament — Bracket</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--card:#ffffff;--text:#1a1a18;--text2:#6b6b67;--text3:#9a9a94;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.22);
  --gold:#c49a1a;--gold-bg:#fdf3d8;--gold-border:#d4a820;
  --line-dim:rgba(0,0,0,0.10);--line-hi:#2563eb;--line-base:rgba(100,100,100,0.35);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--card:#1c1c1a;--text:#e8e8e4;--text2:#8a8a84;--text3:#5a5a54;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.20);
  --gold:#e0aa3e;--gold-bg:#2a2008;--gold-border:#c49a1a;
  --line-dim:rgba(255,255,255,0.06);--line-hi:#3b82f6;--line-base:rgba(160,160,140,0.25);
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#app{padding:20px 16px 40px}
h1{font-size:21px;font-weight:600;letter-spacing:-0.4px;margin-bottom:3px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:20px}
.tab{padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:inherit;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--text2)}
.litem{display:flex;align-items:center;gap:5px}
.ldot{width:9px;height:9px;border-radius:50%}
.lline{height:3px;width:26px;border-radius:2px;background:var(--line-base)}
.lline.thick{height:7px}
#wrap{overflow-x:auto;padding-bottom:10px}
.region-wrap{overflow-x:auto;padding-bottom:10px}

/* Team slots */
.team{position:absolute;display:flex;align-items:center;gap:4px;padding:2px 5px;border-radius:3px;border:0.5px solid var(--border);background:var(--card);cursor:pointer;transition:border-color .12s,background .12s;overflow:hidden;white-space:nowrap}
.team:hover,.team.hovered{border-color:var(--border2);background:var(--card);z-index:10}
.team.champion{border-color:var(--gold-border)!important;background:var(--gold-bg)!important}
.team.playin{border-style:dashed}
.team.dimmed{opacity:.28}
.pbar{position:absolute;left:0;top:0;bottom:0;opacity:.13;border-radius:3px;pointer-events:none}
.seed{font-size:10px;color:var(--text2);font-weight:600;min-width:13px;text-align:right;flex-shrink:0;position:relative}
.tname{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;position:relative}
.tprob{font-size:10px;color:var(--text2);flex-shrink:0;position:relative;margin-left:auto;padding-left:3px}

/* Tooltip */
#tip{position:fixed;display:none;z-index:9999;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;min-width:172px;font-size:12px;pointer-events:none;box-shadow:0 4px 18px rgba(0,0,0,.18)}
#tip.show{display:block}
.tn{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.3}
.trow{display:flex;justify-content:space-between;gap:18px;padding:2px 0;border-top:0.5px solid var(--border)}
.trow:first-of-type{border:none}
.tlabel{color:var(--text2)}
.tval{font-weight:500}
.tchamp{color:var(--gold);font-weight:700}
.tcond{color:#2563eb;font-weight:600}
</style>
</head>

const MATCHUP_ORDER=[[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];
const ROUND_KEYS=['r64','r32','s16','e8','f4','fin','champ'];
const REGIONS=['East','South','West','Midwest'];

function probColor(p){
  if(p>=40)return'#2563eb';
  if(p>=15)return'#16a34a';
  if(p>=5)return'#ca8a04';
  return'#9ca3af';
}

function getRegionSlots(reg){
  const teams=DATA.filter(t=>t.region===reg&&!t.playin);
  const piByS={};
  DATA.filter(t=>t.region===reg&&t.playin).forEach(t=>{
    if(!piByS[t.seed])piByS[t.seed]=[];
    piByS[t.seed].push(t);
  });
  function resolve(seed){
    if(piByS[seed]&&piByS[seed].length===2){
      const pi=piByS[seed];
      return{team:pi[0].code+'/'+pi[1].code,code:'PI'+seed,seed,playin:2,rating:Math.max(pi[0].rating,pi[1].rating),
        r64:pi[0].r64+pi[1].r64,r32:pi[0].r32+pi[1].r32,s16:pi[0].s16+pi[1].s16,e8:pi[0].e8+pi[1].e8,
        f4:pi[0].f4+pi[1].f4,fin:pi[0].fin+pi[1].fin,champ:pi[0].champ+pi[1].champ,_pi:pi};
    }
    return teams.find(t=>t.seed===seed)||null;
  }
  return MATCHUP_ORDER.flatMap(([s1,s2])=>[resolve(s1),resolve(s2)]);
}

// ---- Layout constants ----
const TW=108, TH=22, TGAP=1; // team slot width, height, gap between pair

// Build a region half-bracket as positioned elements + SVG connectors
// Returns {html, svgLines, width, height}
// dir: 'left' (rounds go left→right) or 'right' (rounds go right→left)
function layoutRegion(reg, dir, xOffset, yOffset, roundCount){
  const slots=getRegionSlots(reg);
  const rounds=roundCount||4; // for single region view show 4 rounds (R64-E8)

  // For each round, compute the y-centers of each "game slot"
  // Round 0 = 16 teams = 8 games of 2
  // Round r = 8/2^r teams projected
  const totalTeams=16;
  const pairH=TH*2+TGAP+2; // height of a pair (2 teams + gap)
  const groupH=(rnd)=> pairH * Math.pow(2,rnd);
  const totalH=groupH(0)*8; // same for all rounds: 8 pairs at round 0

  const colW=TW+16; // column width including connector gap
  const results=[];

  for(let r=0;r<rounds;r++){
    const nGroups=8/Math.pow(2,r);
    const gh=groupH(r);
    const col=dir==='left'?r:(rounds-1-r);
    const x=xOffset+col*colW;

    for(let g=0;g<nGroups;g++){
      const centerY=yOffset+g*gh+gh/2;
      const y1=centerY-TH-TGAP/2;
      const y2=centerY+TGAP/2;

      let t1,t2;
      if(r===0){
        t1=slots[g*2]; t2=slots[g*2+1];
      } else {
        // pick best by this round's prob from the group
        const stride=Math.pow(2,r);
        const grpSlots=slots.slice(g*stride*2,(g+1)*stride*2).filter(Boolean);
        const key=ROUND_KEYS[r];
        t1=grpSlots.reduce((a,b)=>(!a||(b&&(b[key]||0)>(a[key]||0))?b:a),null);
        t2=null;
      }

      results.push({r,g,col,x,y1,y2,t1,t2,gh,centerY,dir,reg});
    }
  }
  return{slots,results,totalH,colW,rounds};
}

// Highlight a team path
function highlightTeam(code){
  hoveredCode=code;
  document.querySelectorAll('.team').forEach(el=>{
    if(code){
      el.classList.toggle('dimmed',el.dataset.code!==code);
      el.classList.toggle('hovered',el.dataset.code===code);
    } else {
      el.classList.remove('dimmed','hovered');
    }
  });
  // SVG lines: show/hide
  document.querySelectorAll('line.connector,path.connector').forEach(el=>{
    if(code){
      const show=el.dataset.code===code;
      el.style.opacity=show?'1':'0';
    } else {

    }
  });
  document.querySelectorAll('.cond-label').forEach(el=>{
    if(code){
      el.style.opacity=el.dataset.code===code?'1':'0';
    } else {
      el.style.opacity='0';
    }
  });
}

// ---- Full bracket renderer ----
function renderFull(){
  const REGION_H=16*TH+15*(TGAP+1)+20; // approximate per-region height
  const colW=TW+16;
  // Layout: 4 rounds left (East top, South bottom), center 3 rounds, 4 rounds right (West top, Midwest bottom)
  // Each region gets 4 rounds (R64→E8), center gets F4/Finals/Champ

  // We'll use absolute positioning within a fixed-size container
  const regPad=28; // vertical padding between regions on same side
  const regionRows=2;
  const perRegH=8*(TH*2+TGAP+4)+2; // 8 matchups * pair height
  const totalH=perRegH*2+regPad+60;
  const totalW=colW*4+80+colW*4; // 4 left + center + 4 right

  const container=document.getElementById('container');
  container.innerHTML='';

  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;overflow-x:auto;overflow-y:visible;`;

  const inner=document.createElement('div');
  inner.style.cssText=`position:relative;min-width:${totalW+20}px;height:${totalH+40}px;`;

  const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none;';
  svgEl.setAttribute('width',totalW+20);
  svgEl.setAttribute('height',totalH+40);

  const regSlots={};
  REGIONS.forEach(r=>{regSlots[r]=getRegionSlots(r);});

  // Place regions: East & South on left, West & Midwest on right
  // Left side: 4 cols (R64, R32, S16, E8) going left→right
  // Right side: 4 cols (E8, S16, R32, R64) going right→left (mirrored)
  const leftRegs=['East','South'];
  const rightRegs=['West','Midwest'];

  const centerX=colW*4+40;
  const centerW=colW*3;
  const rightStart=centerX+centerW;

  const teamEls=[]; // {el, t, x, y, side}
  const connectors=[]; // for SVG lines

  function placeRegion(reg, xBase, yBase, dir){
    const slots=regSlots[reg];
    const pairH=TH*2+TGAP+4;
    const rounds=4;

    // For each round, place slots
    // Round 0: 8 pairs of 2, stacked vertically
    // Round r: 8/2^r slots, each centered in span of 2^r pairs

    for(let r=0;r<rounds;r++){
      const nSlots=8/Math.pow(2,r);
      const span=Math.pow(2,r);
      const colIdx=dir==='left'?r:(rounds-1-r);
      const x=xBase+colIdx*colW;
      const key=ROUND_KEYS[r];

      for(let g=0;g<nSlots;g++){
        const groupTop=yBase+g*span*pairH;
        const groupBot=groupTop+span*pairH;
        const midY=(groupTop+groupBot)/2;

        let t;
        if(r===0){
          // two teams per game
          [0,1].forEach(offset=>{
            const slot=slots[g*2+offset];
            if(!slot)return;
            const sy=yBase+g*pairH+(offset===0?0:TH+TGAP+2);
            placeTeam(slot,x,sy,key,dir,reg,r,g);
            teamEls.push({t:slot,x,y:sy+TH/2,r,g,dir,reg,side:dir==='left'?'L':'R'});
          });
        } else {
          const grpSlots=slots.slice(g*span*2,(g+1)*span*2).filter(Boolean);
          t=grpSlots.reduce((a,b)=>(!a||(b&&(b[key]||0)>(a[key]||0))?b:a),null);
          if(t){
            const sy=midY-TH/2;
            placeTeam(t,x,sy,key,dir,reg,r,g);
            teamEls.push({t,x,y:midY,r,g,dir,reg,side:dir==='left'?'L':'R'});
          }
        }
      }
    }

    // Draw connectors between rounds
    for(let r=0;r<rounds-1;r++){
      const nFrom=8/Math.pow(2,r);
      const fromColIdx=dir==='left'?r:(rounds-1-r);
      const toColIdx=dir==='left'?r+1:(rounds-2-r);
      const fromX=xBase+fromColIdx*colW+TW;
      const toX=xBase+toColIdx*colW;
      const midX=(fromX+toX)/2;

      for(let g=0;g<nFrom;g+=2){
        // Two slots from this round converge into one slot in next round
        const span=Math.pow(2,r);
        const pairH=TH*2+TGAP+4;

        function getSlotY(round, gIdx){
          const sp=Math.pow(2,round);
          const gt=yBase+gIdx*sp*pairH;
          const gb=gt+sp*pairH;
          return(gt+gb)/2;
        }

        const y1=getSlotY(r,g);
        const y2=getSlotY(r,g+1);
        const yMid=getSlotY(r+1,Math.floor(g/2));

        // For each slot, find best team
        const key1=ROUND_KEYS[r],key2=ROUND_KEYS[r+1];
        [g,g+1].forEach((gi,idx)=>{
          const sp=Math.pow(2,r);
          const grpSlots=r===0?[slots[gi*2],slots[gi*2+1]].filter(Boolean):slots.slice(gi*sp*2,(gi+1)*sp*2).filter(Boolean);
          const best=grpSlots.reduce((a,b)=>(!a||(b&&(b[key2]||0)>(a[key2]||0))?b:a),null);
          if(!best)return;

          const fromY=r===0?(yBase+gi*pairH+TH/2+(best===grpSlots[1]?TH+TGAP+2:0)):getSlotY(r,gi);
          const toY=yMid;
          const cond=best[key1]>0?(best[key2]/best[key1]*100):0;
          const prob=best[key2]||0;
          const sw=Math.max(0.8,Math.min(6,prob/12));

          connectors.push({t:best,fromX,toX,midX,fromY,toY,r,prob,cond,sw,dir,reg});
        });
      }
    }

    // E8 → F4 connectors (from E8 col to center)
    const e8ColIdx=dir==='left'?3:0;
    const e8X=xBase+e8ColIdx*colW+TW;
    const towardCenter=dir==='left'?e8X+8:e8X-8;
    for(let g=0;g<1;g++){
      const sp=8;
      const pairH=TH*2+TGAP+4;
      const gt=yBase;
      const gb=yBase+16*pairH;
      const midY=(gt+gb)/2;
      const grpSlots=slots.filter(Boolean);
      const best=grpSlots.reduce((a,b)=>(!a||(b&&(b.f4||0)>(a.f4||0))?b:a),null);
      if(best){
        connectors.push({t:best,fromX:e8X,toX:dir==='left'?centerX:rightStart,midX:dir==='left'?centerX-20:rightStart+20,fromY:midY,toY:midY,r:4,prob:best.f4,cond:best.e8>0?(best.f4/best.e8*100):0,sw:Math.max(0.8,Math.min(8,best.f4/8)),dir,reg,toCenter:true});
      }
    }
  }

  function placeTeam(t, x, y, key, dir, reg, r, g){
    if(!t)return;
    const el=document.createElement('div');
    el.className='team'+(t.playin?' playin':'')+(t.champ>10?' champion':'');
    el.dataset.code=t.code;
    el.style.cssText=`left:${x}px;top:${y}px;width:${TW}px;height:${TH}px;`;
    const prob=t[key]||0;
    const col=probColor(prob);
    const nm=t.team.length>14?(t.code||t.team.slice(0,11)):t.team;
    el.innerHTML=`<div class="pbar" style="width:${Math.min(prob,100)}%;background:${col}"></div>
      <span class="seed">${t.seed}</span>
      <span class="tname">${nm}</span>
      <span class="tprob">${prob>0?prob.toFixed(prob<1?1:0)+'%':''}</span>`;
    el.addEventListener('mouseenter',e=>{showTip(e,t);highlightTeam(t.code);});
    el.addEventListener('mouseleave',()=>{hideTip();highlightTeam(null);});
    inner.appendChild(el);
  }

  // Place left regions
  const pairH=TH*2+TGAP+4;
  const eastH=8*pairH;
  placeRegion('East',0,0,'left');
  placeRegion('South',0,eastH+regPad,'left');

  // Place right regions (mirrored)
  placeRegion('West',rightStart,0,'right');
  placeRegion('Midwest',rightStart,eastH+regPad,'right');

  // Center: F4 + Finals + Champ
  const centerMidEast=eastH/2;
  const centerMidSouth=eastH+regPad+eastH/2;
  const centerMidWest=eastH/2;
  const centerMidMidwest=eastH+regPad+eastH/2;

  const f4Teams=REGIONS.map(r=>{
    const s=regSlots[r];
    return s.filter(Boolean).reduce((a,b)=>(!a||(b.f4||0)>(a.f4||0)?b:a),null);
  });
  const finTeams=REGIONS.map(r=>{
    const s=regSlots[r];
    return s.filter(Boolean).reduce((a,b)=>(!a||(b.fin||0)>(a.fin||0)?b:a),null);
  });
  const champTeam=REGIONS.map(r=>{
    const s=regSlots[r];
    return s.filter(Boolean).reduce((a,b)=>(!a||(b.champ||0)>(a.champ||0)?b:a),null);
  }).reduce((a,b)=>(!a||(b.champ||0)>(a.champ||0)?b:a),null);

  // F4 slots
  const f4YEast=centerMidEast-TH/2;
  const f4YSouth=centerMidSouth-TH/2;
  const f4YWest=centerMidWest-TH/2;
  const f4YMidwest=centerMidMidwest-TH/2;
  const finYTop=(f4YEast+f4YSouth)/2;
  const finYBot=(f4YWest+f4YMidwest)/2;
  const champY=(finYTop+finYBot+TH)/2-TH/2;

  const cx1=centerX+8;
  const cx2=centerX+colW;
  const cx3=centerX+colW*2;
  const cxr1=rightStart-8-TW;
  const cxr2=rightStart-colW-TW;

  // F4 left (East, South)
  [f4Teams[0]&&{...f4Teams[0],_fy:f4YEast},f4Teams[1]&&{...f4Teams[1],_fy:f4YSouth}].forEach(t=>{
    if(!t)return;
    placeTeam(t,cx1,t._fy,'f4','left','center',4,0);
  });
  // Finals left
  if(finTeams[0]||finTeams[1]){
    const ft=([finTeams[0],finTeams[1]].filter(Boolean).reduce((a,b)=>(b.fin>a.fin?b:a)));
    placeTeam(ft,cx2,finYTop,'fin','left','center',5,0);
  }
  // Champion
  if(champTeam) placeTeam({...champTeam,champ:99},cx3-TW/2,champY,'champ','left','center',6,0);
  // Finals right
  if(finTeams[2]||finTeams[3]){
    const ft=([finTeams[2],finTeams[3]].filter(Boolean).reduce((a,b)=>(b.fin>a.fin?b:a)));
    placeTeam(ft,cxr2,finYBot,'fin','right','center',5,0);
  }
  // F4 right (West, Midwest)
  [f4Teams[2]&&{...f4Teams[2],_fy:f4YWest},f4Teams[3]&&{...f4Teams[3],_fy:f4YMidwest}].forEach(t=>{
    if(!t)return;
    placeTeam(t,cxr1,t._fy,'f4','right','center',4,0);
  });

  // Region labels
  const labelStyle='position:absolute;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);';
  [['East',2,eastH/2-6],['South',2,eastH+regPad+eastH/2-6],['West',rightStart+colW*2+2,eastH/2-6],['Midwest',rightStart+colW*2+2,eastH+regPad+eastH/2-6]].forEach(([name,x,y])=>{
    const lbl=document.createElement('div');
    lbl.style.cssText=labelStyle+`left:${x}px;top:${y-14}px;`;
    lbl.textContent=name;
    inner.appendChild(lbl);
  });

  // Round labels
  const rlabels=['R64','R32','Sweet 16','Elite 8'];
  rlabels.forEach((lbl,i)=>{
    const lx=i*colW+TW/2;
    const l=document.createElement('div');
    l.style.cssText=`position:absolute;font-size:10px;font-weight:600;letter-spacing:0.7px;text-transform:uppercase;color:var(--text3);text-align:center;width:${TW}px;left:${lx}px;top:${totalH+8}px;`;
    l.textContent=lbl;
    inner.appendChild(l);
    // right side
    const rx=rightStart+(3-i)*colW;
    const r2=document.createElement('div');
    r2.style.cssText=`position:absolute;font-size:10px;font-weight:600;letter-spacing:0.7px;text-transform:uppercase;color:var(--text3);text-align:center;width:${TW}px;left:${rx}px;top:${totalH+8}px;`;
    r2.textContent=lbl;
    inner.appendChild(r2);
  });
  const centerLabels=[['F4',cx1],['Finals',cx2],['Champion',cx3-TW/2],['Finals',cxr2],['F4',cxr1]];
  centerLabels.forEach(([lbl,x])=>{
    const l=document.createElement('div');
    l.style.cssText=`position:absolute;font-size:10px;font-weight:600;letter-spacing:0.7px;text-transform:uppercase;color:var(--text3);text-align:center;width:${TW}px;left:${x}px;top:${totalH+8}px;`;
    l.textContent=lbl;
    inner.appendChild(l);
  });

  // Draw SVG connectors
  connectors.forEach(c=>{
    drawConnector(svgEl,c);
  });

  // Center connectors: F4→Finals→Champ
  // Left side
  if(f4Teams[0]&&finTeams[0]){
    const t=finTeams[0];
    const cond=t.f4>0?(t.fin/t.f4*100):0;
    const sw=Math.max(1,Math.min(7,t.fin/6));
    drawSimpleLine(svgEl,cx1+TW,f4YEast+TH/2,cx2,finYTop+TH/2,t.code,sw,t.fin,cond);
  }
  if(f4Teams[1]&&finTeams[0]){
    const t=finTeams[0];
    const cond=t.f4>0?(t.fin/t.f4*100):0;
    const sw=Math.max(1,Math.min(7,t.fin/6));
    drawSimpleLine(svgEl,cx1+TW,f4YSouth+TH/2,cx2,finYTop+TH/2,f4Teams[1].code,sw,f4Teams[1].fin,f4Teams[1].f4>0?(f4Teams[1].fin/f4Teams[1].f4*100):0);
  }
  if(finTeams[0]&&champTeam){
    const t=champTeam;
    const sw=Math.max(1,Math.min(8,t.champ/4));
    drawSimpleLine(svgEl,cx2+TW,finYTop+TH/2,cx3-TW/2,champY+TH/2,t.code,sw,t.champ,t.fin>0?(t.champ/t.fin*100):0);
  }
  // Right side
  if(f4Teams[2]&&finTeams[2]){
    const t=finTeams[2];
    const cond=t.f4>0?(t.fin/t.f4*100):0;
    const sw=Math.max(1,Math.min(7,t.fin/6));
    drawSimpleLine(svgEl,cxr1,f4YWest+TH/2,cxr2+TW,finYBot+TH/2,t.code,sw,t.fin,cond);
  }
  if(f4Teams[3]){
    const t=f4Teams[3];
    const sw=Math.max(1,Math.min(7,t.fin/6));
    drawSimpleLine(svgEl,cxr1,f4YMidwest+TH/2,cxr2+TW,finYBot+TH/2,t.code,sw,t.fin,t.f4>0?(t.fin/t.f4*100):0);
  }
  if(finTeams[2]&&champTeam){
    const t=finTeams[2];
    const sw=Math.max(1,Math.min(7,t.fin/4));
    drawSimpleLine(svgEl,cxr2,finYBot+TH/2,cx3+TW/2,champY+TH/2,t.code,sw,t.fin,t.f4>0?(t.fin/t.f4*100):0);
  }

  inner.appendChild(svgEl);
  wrap.appendChild(inner);
  container.appendChild(wrap);
}

function drawConnector(svg, c){
  const {t,fromX,toX,fromY,toY,prob,cond,sw,dir} = c;
  if(!t)return;
  const midX=(fromX+toX)/2;

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  const d=`M ${fromX} ${fromY} C ${midX} ${fromY}, ${midX} ${toY}, ${toX} ${toY}`;
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',probColor(prob));
  path.setAttribute('stroke-width',Math.max(0.7,sw));
  path.setAttribute('stroke-opacity','0.45');
  path.dataset.code=t.code;
  path.classList.add('connector');
  path.style.transition='opacity .15s';
  svg.appendChild(path);

  // Conditional prob label (shown on hover)
  if(cond>0){
    const lx=midX;
    const ly=(fromY+toY)/2;
    const fg=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
    fg.setAttribute('x',lx-18);fg.setAttribute('y',ly-9);fg.setAttribute('width','36');fg.setAttribute('height','16');
    fg.dataset.code=t.code;
    fg.classList.add('cond-label');
    fg.style.opacity='0';
    fg.style.transition='opacity .15s';
    const div=document.createElement('div');
    div.style.cssText=`font-size:9px;font-weight:600;color:#2563eb;background:var(--card);border-radius:2px;padding:1px 2px;text-align:center;white-space:nowrap;`;
    div.textContent=cond.toFixed(0)+'%';
    fg.appendChild(div);
    svg.appendChild(fg);
  }
}

function drawSimpleLine(svg,x1,y1,x2,y2,code,sw,prob,cond){
  const midX=(x1+x2)/2;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  const d=`M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',probColor(prob));
  path.setAttribute('stroke-width',Math.max(1,sw));
  path.setAttribute('stroke-opacity','0.5');
  path.dataset.code=code;
  path.classList.add('connector');
  path.style.transition='opacity .15s';
  svg.appendChild(path);

  if(cond>0){
    const lx=(x1+x2)/2;
    const ly=(y1+y2)/2;
    const fg=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
    fg.setAttribute('x',lx-18);fg.setAttribute('y',ly-9);fg.setAttribute('width','36');fg.setAttribute('height','16');
    fg.dataset.code=code;
    fg.classList.add('cond-label');
    fg.style.opacity='0';
    fg.style.transition='opacity .15s';
    const div=document.createElement('div');
    div.style.cssText=`font-size:9px;font-weight:600;color:#2563eb;background:var(--card);border-radius:2px;padding:1px 2px;text-align:center;white-space:nowrap;`;
    div.textContent=cond.toFixed(0)+'%';
    fg.appendChild(div);
    svg.appendChild(fg);
  }
}

// ---- Single region view ----
function renderRegion(reg){
  const container=document.getElementById('container');
  container.innerHTML='';
  const slots=getRegionSlots(reg);
  const pairH=TH*2+TGAP+4;
  const rounds=4;
  const colW=TW+20;
  const totalW=colW*rounds;
  const totalH=8*pairH+40;

  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;overflow-x:auto;`;
  const inner=document.createElement('div');
  inner.style.cssText=`position:relative;width:${totalW+20}px;height:${totalH}px;`;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none;';
  svg.setAttribute('width',totalW+20);
  svg.setAttribute('height',totalH);

  const roundLabels=['R64','Rd of 32','Sweet 16','Elite 8'];

  for(let r=0;r<rounds;r++){
    const nSlots=r===0?8:8/Math.pow(2,r);
    const span=Math.pow(2,r);
    const x=r*colW;
    const key=ROUND_KEYS[r];

    // round label
    const lbl=document.createElement('div');
    lbl.style.cssText=`position:absolute;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text3);left:${x+2}px;top:${totalH-28}px;`;
    lbl.textContent=roundLabels[r];
    inner.appendChild(lbl);

    for(let g=0;g<nSlots;g++){
      const groupTop=g*span*pairH;
      const groupBot=groupTop+span*pairH;
      const midY=(groupTop+groupBot)/2;

      if(r===0){
        [0,1].forEach(offset=>{
          const t=slots[g*2+offset];
          if(!t)return;
          const sy=g*pairH+(offset===0?0:TH+TGAP+2);
          placeTeamR(t,x,sy,key,inner);
          // connectors to round 1
          if(r<rounds-1){
            const nextSpan=Math.pow(2,1);
            const nextG=Math.floor(g/2);
            const nTop=nextG*nextSpan*pairH;
            const nBot=nTop+nextSpan*pairH;
            const nextMidY=(nTop+nBot)/2;
            const fromY=sy+TH/2;
            const toY=nextMidY;
            const condVal=t[ROUND_KEYS[1]]>0?(t[ROUND_KEYS[1]]/t[ROUND_KEYS[0]]*100):0;
            drawConnectorR(svg,x+TW,fromY,(r+1)*colW,toY,t,ROUND_KEYS[1],condVal);
          }
        });
      } else {
        const grpSlots=slots.slice(g*span*2,(g+1)*span*2).filter(Boolean);
        const t=grpSlots.reduce((a,b)=>(!a||(b&&(b[key]||0)>(a[key]||0))?b:a),null);
        if(!t)continue;
        const sy=midY-TH/2;
        placeTeamR(t,x,sy,key,inner);
        if(r<rounds-1){
          const nextSpan=Math.pow(2,r+1);
          const nextG=Math.floor(g/2);
          const nTop=nextG*nextSpan*pairH;
          const nBot=nTop+nextSpan*pairH;
          const nextMidY=(nTop+nBot)/2;
          const condVal=t[key]>0?(t[ROUND_KEYS[r+1]]/t[key]*100):0;
          drawConnectorR(svg,x+TW,midY,(r+1)*colW,nextMidY,t,ROUND_KEYS[r+1],condVal);
        }
      }
    }
  }

  function placeTeamR(t,x,y,key,parent){
    const el=document.createElement('div');
    el.className='team'+(t.playin?' playin':'')+(t.champ>10?' champion':'');
    el.dataset.code=t.code;
    el.style.cssText=`left:${x}px;top:${y}px;width:${TW}px;height:${TH}px;`;
    const prob=t[key]||0;
    const col=probColor(prob);
    const nm=t.team.length>14?t.code:t.team;
    el.innerHTML=`<div class="pbar" style="width:${Math.min(prob,100)}%;background:${col}"></div>
      <span class="seed">${t.seed}</span>
      <span class="tname">${nm}</span>
      <span class="tprob">${prob>0?prob.toFixed(prob<1?1:0)+'%':''}</span>`;
    el.addEventListener('mouseenter',e=>{showTip(e,t);highlightTeam(t.code);});
    el.addEventListener('mouseleave',()=>{hideTip();highlightTeam(null);});
    parent.appendChild(el);
  }

  function drawConnectorR(svg,x1,y1,x2,y2,t,toKey,cond){
    const prob=t[toKey]||0;
    const sw=Math.max(0.8,Math.min(7,prob/14));
    const midX=(x1+x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const d=`M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',probColor(prob));
    path.setAttribute('stroke-width',sw);
    path.setAttribute('stroke-opacity','0.5');
    path.dataset.code=t.code;
    path.classList.add('connector');
    path.style.transition='opacity .15s';
    svg.appendChild(path);

    if(cond>0){
      const fg=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
      fg.setAttribute('x',midX-18);fg.setAttribute('y',(y1+y2)/2-9);fg.setAttribute('width','36');fg.setAttribute('height','16');
      fg.dataset.code=t.code;
      fg.classList.add('cond-label');
      fg.style.opacity='0';
      fg.style.transition='opacity .15s';
      const div=document.createElement('div');
      div.style.cssText=`font-size:9px;font-weight:700;color:#2563eb;background:var(--card);border-radius:3px;padding:1px 3px;text-align:center;white-space:nowrap;line-height:14px;`;
      div.textContent=cond.toFixed(0)+'%';
      fg.appendChild(div);
      svg.appendChild(fg);
    }
  }

  inner.appendChild(svg);
  wrap.appendChild(inner);
  container.appendChild(wrap);
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(tab==='all') renderFull();
  else renderRegion(tab);
}

renderFull();
</script>
</body>
</html>
